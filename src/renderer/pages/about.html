<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
  <style>
    body { 
      background: transparent !important; color: white; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable Text", sans-serif; 
      display: flex; justify-content: center; align-items: center; 
      height: 100vh; margin: 0; overflow: hidden; 
    }
    .wrapper { position: relative; padding: 30px; }
    .wrapper::before {
      content: ''; position: absolute; inset: 25px; border-radius: 28px;
      background: rgba(0, 0, 0, 0.5); filter: blur(12px); z-index: -1;
    }
    .modal-box { 
      background: #1c1c1e; padding: 35px; border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; 
      width: 250px; position: relative; z-index: 1;
    }
    .logo-icon { font-size: 54px !important; color: #0A84FF; margin-bottom: 15px; }
    h2 { margin: 0 0 5px 0; font-weight: 600; font-size: 22px; }
    p { color: #a1a1a6; margin: 0 0 25px 0; font-size: 14px; }
    
    .actions { display: flex; flex-direction: column; gap: 10px; }
    
    button { 
      border: none; width: 100%; color: white; padding: 12px; 
      border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;
    }
    
    #btn-update { background: #0A84FF; }
    #btn-update:hover { background: #007aff; }
    #btn-update:disabled { background: #3a3a3c; color: #a1a1a6; cursor: not-allowed; }
    
    #btn-close { background: rgba(255, 255, 255, 0.1); }
    #btn-close:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="modal-box">
      <span class="material-symbols-outlined logo-icon">shield_lock</span>
      <h2>RYZE</h2>
      <p>Version <span id="app-version">Loading...</span></p>
      
      <div class="actions">
        <button id="btn-update">Check for Updates</button>
        <button id="btn-close" onclick="window.close()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Grab the version passed from main.js
    const params = new URLSearchParams(window.location.search);
    const version = params.get('version') || 'Unknown';
    document.getElementById('app-version').innerText = version;

    // Handle Update Checking
    const updateBtn = document.getElementById('btn-update');

    updateBtn.addEventListener('click', () => {
      updateBtn.innerText = 'Checking...';
      updateBtn.disabled = true;
      window.mailAPI.checkForUpdates();
    });

    // Handle Errors
    window.mailAPI.onUpdateError((errMsg) => {
      console.error(errMsg); // Logs the exact error to the console
      updateBtn.innerText = 'Check Failed';
      
      // Reset the button after 3 seconds so they can try again
      setTimeout(() => {
        updateBtn.innerText = 'Check for Updates';
        updateBtn.disabled = false;
      }, 3000);
    });

    // Reset button if no updates are found
    window.mailAPI.onUpdateNotAvailable(() => {
      updateBtn.innerText = 'App is up to date!';
      
      // Reset back to normal after 3 seconds
      setTimeout(() => {
        updateBtn.innerText = 'Check for Updates';
        updateBtn.disabled = false;
      }, 3000);
    });
  </script>

</body>
</html>
